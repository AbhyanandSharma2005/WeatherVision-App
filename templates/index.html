<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherVision | AI Classification</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .background-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .blob {
            position: absolute;
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.4);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.02);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .upload-text {
            color: var(--text-muted);
            font-size: 1rem;
        }

        #file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 99px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--primary);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-card {
            margin-top: 2rem;
            display: none;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 1.5rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 1rem;
            max-height: 250px;
            object-fit: cover;
        }

        .weather-tag {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 99px;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .confidence {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <h1>WeatherVision</h1>
        <p class="subtitle">Upload an image to classify the weather condition</p>

        <form id="upload-form">
            <div class="upload-area" id="drop-zone">
                <span class="upload-icon">☁️</span>
                <p class="upload-text">Drag & Drop an image here or click to browse</p>
                <input type="file" id="file-input" name="file" accept="image/*" required>
            </div>
            
            <button type="submit" class="btn" id="submit-btn">Analyze Weather</button>
        </form>

        <div class="loader" id="loader"></div>

        <div class="result-card" id="result-card">
            <img src="" id="preview" class="preview-img" alt="Uploaded Preview">
            <div>
                <div class="weather-tag" id="weather-result">Sunny</div>
                <div class="confidence">Confidence: <span id="confidence-score">99%</span></div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('result-card');
        const submitBtn = document.getElementById('submit-btn');

        // Drag and Drop Effects
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            updateDropZoneText(files[0]);
        });

        fileInput.addEventListener('change', function() {
            if(this.files && this.files[0]) {
                updateDropZoneText(this.files[0]);
            }
        });

        function updateDropZoneText(file) {
            const textElement = dropZone.querySelector('.upload-text');
            textElement.textContent = `Selected: ${file.name}`;
        }

        // Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            submitBtn.disabled = true;
            loader.style.display = 'block';
            resultCard.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if(response.ok) {
                    document.getElementById('preview').src = URL.createObjectURL(fileInput.files[0]);
                    document.getElementById('weather-result').textContent = data.weather;
                    document.getElementById('confidence-score').textContent = data.confidence;
                    
                    // Dynamic color based on weather
                    const tag = document.getElementById('weather-result');
                    if(data.weather === 'Sunny') tag.style.background = 'linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)';
                    else if(data.weather === 'Rainy') tag.style.background = 'linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%)';
                    else if(data.weather === 'Cloudy') tag.style.background = 'linear-gradient(135deg, #94a3b8 0%, #64748b 100%)';
                    else if(data.weather === 'Snowy') tag.style.background = 'linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%)';

                    resultCard.style.display = 'block';
                } else {
                    alert(data.error || 'An error occurred');
                }
            } catch(err) {
                alert('Server error occurred');
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
